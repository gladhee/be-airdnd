name: 🚪 Access Gateway CI

on:
  pull_request:
    branches: [ "dev" ]
    paths:
      - 'access_gateway/**'
    paths-ignore:
      - 'common/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run access_gateway tests and generate JaCoCo report
        run: ./gradlew clean :access_gateway:jacocoTestReport --no-daemon

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          files: ./access_gateway/build/reports/jacoco/test/jacocoTestReport.xml
          flags: access_gateway
