name: 👤 Member Service CI

on:
  pull_request:
    branches: [ "dev" ]
    paths:
      - 'member/**'
      - 'common/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      IMAGE_SERVICE_URL: ${{ vars.IMAGE_SERVICE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      NAVER_REDIRECT_URI: ${{ secrets.NAVER_REDIRECT_URI }}
      NAVER_AUTHORIZATION_GRANT_TYPE: ${{ secrets.NAVER_AUTHORIZATION_GRANT_TYPE }}
      NAVER_SCOPE: ${{ secrets.NAVER_SCOPE }}
      NAVER_AUTHORIZATION_URI: ${{ secrets.NAVER_AUTHORIZATION_URI }}
      NAVER_TOKEN_URI: ${{ secrets.NAVER_TOKEN_URI }}
      NAVER_USER_INFO_URI: ${{ secrets.NAVER_USER_INFO_URI }}
      NAVER_USER_NAME_ATTRIBUTE: ${{ secrets.NAVER_USER_NAME_ATTRIBUTE }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run member tests and generate JaCoCo report
        run: ./gradlew clean :member:jacocoTestReport --no-daemon

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          files: ./member/build/reports/jacoco/test/jacocoTestReport.xml
          flags: member
