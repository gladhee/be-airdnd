spring:
  application:
      name: access-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: listing
            uri: ${LISTING_SERVICE_URL}
            predicates:
              - Path=/api/listings/**
          - id: booking
            uri: ${BOOKING_SERVICE_URL}
            predicates:
              - Path=/api/bookings/**
          - id: payment
            uri: ${PAYMENT_SERVICE_URL}
            predicates:
              - Path=/api/payments/**
          - id: member
            uri: ${MEMBER_SERVICE_URL}
            predicates:
              - Path=/api/members/**
          - id: image
            uri: ${IMAGE_SERVICE_URL}
            predicates:
              - Path=/api/images/**
          - id: messaging
            uri: ${MESSAGING_SERVICE_URL}
            predicates:
              - Path=/api/messaging/**
